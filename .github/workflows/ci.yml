name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  app:
    name: app (typecheck · test · coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc -p tsconfig.json --noEmit
      - name: Unit + integration + BDD + e2e (with coverage gate)
        run: pnpm vitest run --coverage
      - name: Upload e2e evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: e2e/artifacts/
          if-no-files-found: ignore

  infra:
    name: infra (manifests · IaC scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize + kubeconform
        run: |
          curl -sLo /tmp/kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar -xz -C /usr/local/bin kubeconform
      - name: Render & validate overlays
        run: |
          for env in dev staging prod; do
            echo "== overlay: $env =="
            kustomize build infra/overlays/$env | kubeconform -strict -summary -ignore-missing-schemas
          done

  image:
    name: image (core + web container builds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/core/Dockerfile
          push: false
          tags: ghcr.io/arielshad/the-company-core:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: ghcr.io/arielshad/the-company-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-smoke:
    name: compose-smoke (core boots, /healthz green)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Boot core (sqlite, dev-auth) via compose
        run: docker compose up -d --build core
      - name: Wait for /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz; then echo "core healthy"; exit 0; fi
            echo "waiting for core... $i/30"; sleep 3
          done
          docker compose logs core; exit 1
      - name: Teardown
        if: always()
        run: docker compose down -v

  authz-openfga:
    name: authz-openfga (OpenFGA integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start OpenFGA
        run: docker run -d --name openfga -p 8080:8080 openfga/openfga:latest run
      - name: Wait for OpenFGA to be healthy
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/healthz; then
              echo "OpenFGA is healthy"
              exit 0
            fi
            echo "Waiting for OpenFGA... attempt $i/15"
            sleep 2
          done
          echo "OpenFGA did not become healthy in time"
          exit 1
      - name: Run OpenFGA integration tests
        run: OPENFGA_API_URL=http://localhost:8080 pnpm vitest run packages/auth/src/openfga.integration.test.ts

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openfga
  namespace: the-company
  labels:
    app.kubernetes.io/name: openfga
    app.kubernetes.io/part-of: the-company
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openfga
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from core (HTTP API + gRPC)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: core
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
    # Allow to shared Postgres (CNPG)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgres
      ports:
        - protocol: TCP
          port: 5432

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eval-service
  namespace: companyos-system
  labels:
    app.kubernetes.io/name: eval-service
    app.kubernetes.io/part-of: companyos
    app.kubernetes.io/managed-by: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: eval-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from gateway only
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
      ports:
        - protocol: TCP
          port: 8080
    # Allow from governance (eval-gated policy checks)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: governance
      ports:
        - protocol: TCP
          port: 8080
    # Allow from workflow-engine (eval nodes)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: workflow-engine
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
    # Allow to gateway (LLM judge calls via gateway)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
      ports:
        - protocol: TCP
          port: 8080
    # Allow to platform namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: companyos-platform
    # Allow to external HTTPS (LLM provider APIs)
    - ports:
        - protocol: TCP
          port: 443

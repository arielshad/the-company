apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: skill-registry
  namespace: companyos-system
  labels:
    app.kubernetes.io/name: skill-registry
    app.kubernetes.io/part-of: companyos
    app.kubernetes.io/managed-by: argocd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: skill-registry
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

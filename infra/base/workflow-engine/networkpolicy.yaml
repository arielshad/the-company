apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workflow-engine
  namespace: companyos-system
  labels:
    app.kubernetes.io/name: workflow-engine
    app.kubernetes.io/part-of: companyos
    app.kubernetes.io/managed-by: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: workflow-engine
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from gateway only
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
    # Allow to gateway (for MCP/tool calls)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
      ports:
        - protocol: TCP
          port: 8080
    # Allow to platform namespace (Postgres, Redis, Trigger.dev)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: companyos-platform

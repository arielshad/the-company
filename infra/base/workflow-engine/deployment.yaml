apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-engine
  namespace: companyos-system
  labels:
    app.kubernetes.io/name: workflow-engine
    app.kubernetes.io/part-of: companyos
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: workflow-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workflow-engine
        app.kubernetes.io/part-of: companyos
        app.kubernetes.io/managed-by: argocd
    spec:
      serviceAccountName: workflow-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: workflow-engine
          image: ghcr.io/companyos/workflow-engine:REPLACED_BY_OVERLAY
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          envFrom:
            - configMapRef:
                name: workflow-engine-config
            - secretRef:
                name: workflow-engine-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web
  namespace: the-company
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: the-company
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress-nginx controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
    # Allow to core API (same namespace)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: core
      ports:
        - protocol: TCP
          port: 8080

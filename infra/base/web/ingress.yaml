apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: the-company
  namespace: the-company
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: the-company
  annotations:
    # MCP uses SSE (Server-Sent Events) — bump timeouts and disable buffering
    # so events flush to the client immediately (mirrors shep-app ingress).
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
    - host: company.shep.bot
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: core
                port:
                  number: 80
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: core
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80

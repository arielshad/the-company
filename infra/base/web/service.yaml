apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: the-company
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: the-company
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: web
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP

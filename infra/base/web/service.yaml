apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: companyos-system
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: companyos
    app.kubernetes.io/managed-by: argocd
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: web
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP

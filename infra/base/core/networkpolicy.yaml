apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: core
  namespace: the-company
  labels:
    app.kubernetes.io/name: core
    app.kubernetes.io/part-of: the-company
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: core
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress-nginx controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # Allow from web (same namespace)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: web
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
    # Allow to openfga (same namespace)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openfga
      ports:
        - protocol: TCP
          port: 8080
    # Allow to shared Postgres (CNPG)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow to Keycloak
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - protocol: TCP
          port: 8080
    # Allow HTTPS egress for Anthropic API and external services
    - ports:
        - protocol: TCP
          port: 443

# All secrets sourced from Infisical project "the-company" via ClusterSecretStore "the-company".
# The-company-auth and the-company-db secrets are provisioned by shep-infra's
# setup-the-company.sh and are NOT managed here.

# ghcr-pull: docker-registry secret for pulling private GHCR images.
# creationPolicy:None — ESO validates the store but does not manage this secret's type.
# To rotate: kubectl -n the-company create secret docker-registry ghcr-pull \
#   --docker-server=ghcr.io --docker-username=x-access-token \
#   --docker-password=<new-pat> --dry-run=client -o yaml | kubectl apply -f -
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull
  namespace: the-company
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: the-company
  target:
    name: ghcr-pull
    creationPolicy: None
  data:
    - secretKey: GHCR_PAT
      remoteRef:
        key: GHCR_PAT
---
# the-company-ai: Anthropic API key for LLM calls in core.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: the-company-ai
  namespace: the-company
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: the-company
  target:
    name: the-company-ai
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: ANTHROPIC_API_KEY
---
# the-company-openfga: OpenFGA store configuration for core.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: the-company-openfga
  namespace: the-company
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: the-company
  target:
    name: the-company-openfga
    creationPolicy: Owner
  data:
    - secretKey: OPENFGA_STORE_ID
      remoteRef:
        key: OPENFGA_STORE_ID
---
# the-company-openfga-db: Postgres DSN for the OpenFGA datastore.
# Points at the shared CNPG cluster (shep-pg) with a dedicated openfga role/db.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: the-company-openfga-db
  namespace: the-company
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: the-company
  target:
    name: the-company-openfga-db
    creationPolicy: Owner
  data:
    - secretKey: OPENFGA_DATASTORE_URI
      remoteRef:
        key: OPENFGA_DATASTORE_URI
---
# the-company-connectors: OAuth credentials for third-party connector integrations.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: the-company-connectors
  namespace: the-company
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: the-company
  target:
    name: the-company-connectors
    creationPolicy: Owner
  data:
    - secretKey: NOTION_CLIENT_ID
      remoteRef:
        key: NOTION_CLIENT_ID
    - secretKey: NOTION_CLIENT_SECRET
      remoteRef:
        key: NOTION_CLIENT_SECRET
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: SLACK_BOT_TOKEN
    - secretKey: ZOOM_CLIENT_ID
      remoteRef:
        key: ZOOM_CLIENT_ID
    - secretKey: ZOOM_CLIENT_SECRET
      remoteRef:
        key: ZOOM_CLIENT_SECRET
    - secretKey: ZOOM_WEBHOOK_SECRET
      remoteRef:
        key: ZOOM_WEBHOOK_SECRET

apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectors
  namespace: companyos-system
  labels:
    app.kubernetes.io/name: connectors
    app.kubernetes.io/part-of: companyos
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: connectors
  template:
    metadata:
      labels:
        app.kubernetes.io/name: connectors
        app.kubernetes.io/part-of: companyos
        app.kubernetes.io/managed-by: argocd
    spec:
      serviceAccountName: connectors
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: connectors
          image: ghcr.io/companyos/connectors:REPLACED_BY_OVERLAY
          # connectors is a worker-only deployment; no HTTP port exposed
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: connectors-config
            - secretRef:
                name: connectors-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

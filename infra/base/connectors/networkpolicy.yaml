apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: connectors
  namespace: companyos-system
  labels:
    app.kubernetes.io/name: connectors
    app.kubernetes.io/part-of: companyos
    app.kubernetes.io/managed-by: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: connectors
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # connectors is a worker; no inbound traffic from cluster peers
    []
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
    # Allow to brain (ingestion)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: brain
      ports:
        - protocol: TCP
          port: 8080
    # Allow to gateway (MCP/tool calls)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
      ports:
        - protocol: TCP
          port: 8080
    # Allow to platform namespace (Redis Streams/NATS, Postgres)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: companyos-platform
    # Allow to external HTTPS (connector APIs: Notion, GitHub, Slack, etc.)
    - ports:
        - protocol: TCP
          port: 443

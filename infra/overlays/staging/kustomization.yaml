apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: the-company

commonLabels:
  app.kubernetes.io/environment: staging

resources:
  - ../../base/core
  - ../../base/web
  - ../../base/openfga
  - ../../base/external-secrets

images:
  - name: ghcr.io/arielshad/the-company-core
    newTag: staging
  - name: ghcr.io/arielshad/the-company-web
    newTag: staging

patches:
  # Staging: base replicas (2) are fine; explicitly confirm for clarity.
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: not-used
      spec:
        replicas: 2
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=the-company"

  # Staging: ensure all HPAs have minReplicas: 2
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: not-used
      spec:
        minReplicas: 2
    target:
      kind: HorizontalPodAutoscaler
      labelSelector: "app.kubernetes.io/part-of=the-company"

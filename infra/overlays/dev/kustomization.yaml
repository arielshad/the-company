apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: the-company

commonLabels:
  app.kubernetes.io/environment: dev

resources:
  - ../../base/core
  - ../../base/web
  - ../../base/openfga
  - ../../base/external-secrets

images:
  - name: ghcr.io/arielshad/the-company-core
    newTag: dev
  - name: ghcr.io/arielshad/the-company-web
    newTag: dev

patches:
  # Dev: reduce all Deployments to 1 replica with lower resources.
  # JSON6902 (op list) so it is container-name-agnostic — a strategic-merge
  # patch keyed on container name would append a phantom container instead.
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=the-company"
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi

  # Dev: reduce all HPAs minReplicas to 1
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: not-used
      spec:
        minReplicas: 1
    target:
      kind: HorizontalPodAutoscaler
      labelSelector: "app.kubernetes.io/part-of=the-company"

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: the-company

commonLabels:
  app.kubernetes.io/environment: prod

resources:
  - ../../base/core
  - ../../base/web
  - ../../base/openfga
  - ../../base/external-secrets

images:
  - name: ghcr.io/arielshad/the-company-core
    newTag: stable
  - name: ghcr.io/arielshad/the-company-web
    newTag: stable

patches:
  # Prod: scale all Deployments to 3 replicas with higher resources.
  # JSON6902 (op list) so it is container-name-agnostic — a strategic-merge
  # patch keyed on container name would append a phantom container instead.
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=the-company"
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi

  # Prod: ensure all HPAs minReplicas: 3 with higher maxReplicas
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: not-used
      spec:
        minReplicas: 3
        maxReplicas: 20
    target:
      kind: HorizontalPodAutoscaler
      labelSelector: "app.kubernetes.io/part-of=the-company"

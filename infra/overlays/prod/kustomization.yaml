apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: companyos-system

commonLabels:
  app.kubernetes.io/environment: prod

resources:
  - ../../base/web
  - ../../base/gateway
  - ../../base/agent-registry
  - ../../base/brain
  - ../../base/workflow-engine
  - ../../base/skill-registry
  - ../../base/governance
  - ../../base/connectors
  - ../../base/eval-service

images:
  - name: ghcr.io/companyos/web
    newTag: stable
  - name: ghcr.io/companyos/gateway
    newTag: stable
  - name: ghcr.io/companyos/agent-registry
    newTag: stable
  - name: ghcr.io/companyos/brain
    newTag: stable
  - name: ghcr.io/companyos/workflow-engine
    newTag: stable
  - name: ghcr.io/companyos/skill-registry
    newTag: stable
  - name: ghcr.io/companyos/governance
    newTag: stable
  - name: ghcr.io/companyos/connectors
    newTag: stable
  - name: ghcr.io/companyos/eval-service
    newTag: stable

patches:
  # Prod: scale all Deployments to 3 replicas with higher resources.
  # JSON6902 (op list) so it is container-name-agnostic — a strategic-merge
  # patch keyed on container name would append a phantom container instead.
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=companyos"
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi

  # Prod: ensure all HPAs minReplicas: 3
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: not-used
      spec:
        minReplicas: 3
        maxReplicas: 20
    target:
      kind: HorizontalPodAutoscaler
      labelSelector: "app.kubernetes.io/part-of=companyos"

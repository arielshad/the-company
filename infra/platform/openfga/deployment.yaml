apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfga
  labels:
    app.kubernetes.io/name: openfga
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: openfga
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openfga
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: openfga
          image: openfga/openfga:latest
          args: ["run"]
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 8081
          env:
            - name: OPENFGA_DATASTORE_ENGINE
              value: postgres
          envFrom:
            - secretRef:
                name: openfga-secrets   # OPENFGA_DATASTORE_URI, preshared keys
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "1", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: companyos-app-of-apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: companyos
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: companyos

  source:
    repoURL: https://github.com/arielshad/the-company
    targetRevision: HEAD
    path: infra/argocd/apps
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-sealed-secrets
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: companyos
    app.kubernetes.io/managed-by: argocd
  annotations:
    # Must be first: the controller has to exist before any SealedSecret can be
    # decrypted, and before platform deps whose Secrets are sealed.
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: companyos

  source:
    repoURL: https://github.com/arielshad/the-company
    targetRevision: HEAD
    path: infra/platform/sealed-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: companyos-platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

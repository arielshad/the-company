apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: companyos-services
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: companyos
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: companyos

  source:
    repoURL: https://github.com/arielshad/the-company
    targetRevision: HEAD
    path: infra/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: companyos-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

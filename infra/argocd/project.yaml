apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: companyos
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: companyos
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "CompanyOS — GitOps project for all services and platform components"

  sourceRepos:
    - "https://github.com/arielshad/the-company"
    # Helm/OCI repos for platform charts
    - "https://charts.bitnami.com/bitnami"
    - "https://helm.releases.hashicorp.com"
    - "https://openfga.github.io/helm-charts"
    - "https://triggerdev.github.io/helm-charts"
    - "https://qdrant.github.io/qdrant-helm"

  destinations:
    - server: https://kubernetes.default.svc
      namespace: companyos-system
    - server: https://kubernetes.default.svc
      namespace: companyos-platform
    - server: https://kubernetes.default.svc
      namespace: argocd

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "networking.k8s.io"
      kind: NetworkPolicy
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition
    - group: "admissionregistration.k8s.io"
      kind: MutatingWebhookConfiguration
    - group: "admissionregistration.k8s.io"
      kind: ValidatingWebhookConfiguration

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  roles:
    - name: admin
      description: Full access to companyos project
      policies:
        - p, proj:companyos:admin, applications, *, companyos/*, allow
      groups:
        - companyos-admins
    - name: read-only
      description: Read-only access to companyos project
      policies:
        - p, proj:companyos:read-only, applications, get, companyos/*, allow
      groups:
        - companyos-developers
